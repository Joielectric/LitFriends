<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/CA_ICON.png">
  <link rel="apple-touch-icon" href="images/CA_ICON.png">
  <link rel="manifest" href="manifest-ca.json">
  <title>Listen — Consenting Adults</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060306;
      --surface: #0c090c;
      --surface-2: #120f12;
      --surface-3: #181518;
      --border: rgba(200,120,110,0.14);
      --border-mid: rgba(210,130,120,0.3);
      --border-hi: rgba(220,150,140,0.55);
      --text: #ede4e0;
      --text-mid: #b09090;
      --text-dim: #5a3a38;
      --silver: #d8c8c0;
      --silver-hi: #f5ece8;
      --coral: #e8634f;
      --rose: #c05070;
      --radius: 2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 16px;
      line-height: 1.75;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-wrap { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 1.5rem 6rem; }

    .back-nav {
      padding: 1.6rem 0 0;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .back-link {
      color: var(--silver); text-decoration: none;
      font-family: "Cinzel", serif; font-size: 0.7rem; letter-spacing: .12em; text-transform: uppercase;
      transition: color .2s;
    }
    .back-link:hover { color: var(--silver-hi); }
    .back-sep { color: var(--text-mid); font-size: 0.7rem; }

    .hero {
      text-align: center; padding: 3rem 0 2.4rem;
    }
    .hero-eyebrow {
      font-family: "Cinzel", serif;
      font-size: 0.72rem; letter-spacing: .5em; text-transform: uppercase;
      color: var(--silver); display: block; margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: "Cinzel", serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 300; letter-spacing: .12em;
      background: linear-gradient(160deg, #f0c8b8 0%, var(--coral) 40%, var(--rose) 70%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.8rem;
    }
    .hero-sub {
      color: var(--text-mid); font-style: italic; font-size: 1.05rem;
    }
    .hero-divider {
      display: flex; align-items: center; gap: 1rem;
      justify-content: center; margin: 1.6rem auto; max-width: 260px;
    }
    .hero-divider span { flex: 1; height: 1px; background: var(--border); }
    .hero-divider i { width: 4px; height: 4px; background: var(--coral); transform: rotate(45deg); display: inline-block; opacity: .7; }

    .section-label {
      font-family: "Cinzel", serif;
      font-size: 0.72rem; font-weight: 600; letter-spacing: .38em; text-transform: uppercase;
      color: var(--text-dim);
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.6rem;
    }
    .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border-mid); }

    /* === STARFIELD & WAVEFORM === */
    #stars, #waveform {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .bg-glow {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 100%, rgba(140,30,50,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(200,60,50,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 70%, rgba(180,50,90,0.10) 0%, transparent 60%);
    }

    footer {
      text-align: center; padding: 2rem 1rem;
      color: var(--text-dim);
      font-family: "Cinzel", serif;
      font-size: 0.65rem; letter-spacing: .3em; text-transform: uppercase;
      border-top: 1px solid var(--border);
      position: relative; z-index: 1;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="waveform"></canvas>
<div class="bg-glow"></div>

<div class="page-wrap">

  <nav class="back-nav">
    <a class="back-link" href="index.html">&#8592; Home</a>
  </nav>

  <header class="hero">
    <span class="hero-eyebrow">Consenting Adults</span>
    <h1>Listen</h1>
    <div class="hero-divider"><span></span><i></i><span></span></div>
    <p class="hero-sub">Browse the full catalog across all artists and platforms.</p>
  </header>

  <div class="section-label">Audio Catalog</div>
  <div id="audio-catalog"></div>

</div>

<footer>
  Consenting Adults &mdash; 18+ only
</footer>

<script>
  // Starfield
  (function(){
    var canvas = document.getElementById("stars");
    var ctx = canvas.getContext("2d");
    var stars = [];
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function init(){
      stars = [];
      for(var i = 0; i < 180; i++){
        stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height,
          r: Math.random()*1.1+0.2, o: Math.random()*0.5+0.1, speed: Math.random()*0.015+0.005 });
      }
    }
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(function(s){
        s.o += s.speed;
        if(s.o > 0.7) s.speed = -Math.abs(s.speed);
        if(s.o < 0.1) s.speed =  Math.abs(s.speed);
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = "rgba(240,200,180,"+s.o+")"; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); init(); draw();
    window.addEventListener("resize", function(){ resize(); init(); });
  })();

  // Waveform
  (function(){
    var canvas = document.getElementById("waveform");
    var ctx = canvas.getContext("2d");
    var t = 0;
    var waves = [
      { freq:0.010, amp:0.06, speed:0.0004, phase:0.0, color:"232,99,79",   opacity:0.35, width:2.0, yPos:0.08 },
      { freq:0.014, amp:0.05, speed:0.0003, phase:1.2, color:"192,57,74",   opacity:0.28, width:1.5, yPos:0.20 },
      { freq:0.008, amp:0.07, speed:0.0005, phase:2.5, color:"232,117,138", opacity:0.22, width:2.5, yPos:0.32 },
      { freq:0.012, amp:0.05, speed:0.0003, phase:3.8, color:"232,99,79",   opacity:0.30, width:1.8, yPos:0.44 },
      { freq:0.009, amp:0.08, speed:0.0002, phase:0.7, color:"180,50,90",   opacity:0.20, width:3.0, yPos:0.56 },
      { freq:0.016, amp:0.04, speed:0.0004, phase:2.0, color:"232,99,79",   opacity:0.25, width:1.5, yPos:0.68 },
      { freq:0.007, amp:0.09, speed:0.0002, phase:4.5, color:"192,57,74",   opacity:0.18, width:2.0, yPos:0.80 },
      { freq:0.013, amp:0.05, speed:0.0003, phase:1.8, color:"232,117,138", opacity:0.22, width:1.2, yPos:0.92 },
    ];
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function drawWave(wave){
      var w=canvas.width, h=canvas.height, baseY=h*wave.yPos, amp=h*wave.amp;
      ctx.beginPath();
      for(var x=0; x<=w; x+=2){
        var y = baseY
          + Math.sin(x*wave.freq + t*wave.speed*100 + wave.phase)*amp
          + Math.sin(x*wave.freq*0.5 + t*wave.speed*60 + wave.phase+1)*amp*0.4;
        if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.strokeStyle = "rgba("+wave.color+","+wave.opacity+")";
      ctx.lineWidth = wave.width; ctx.stroke();
    }
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      waves.forEach(function(wave){ drawWave(wave); });
      t++; requestAnimationFrame(draw);
    }
    resize(); draw();
    window.addEventListener("resize", resize);
  })();
</script>
<script src="/js/audio.js"></script>
<script>
  AudioGrid.init({ container: '#audio-catalog', showFilters: true });
</script>

<script src="/js/nav.js"></script>
</body>
</html>
